<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpenderMarket - Fandom to Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#F5EFF8;--card:#FFFFFF;--card-alt:#F0EAF6;
      --pri:#9B7FC0;--pri-l:#B49AD4;--pri-dim:rgba(155,127,192,0.08);
      --txt:#2D2440;--txt-m:#7A6F94;--txt-mm:#A9A0BA;
      --bdr:rgba(155,127,192,0.18);--ok:#6BAF80;--no:#C07078;
      --sh:0 2px 16px rgba(155,127,192,0.1);
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;line-height:1.6}

    nav{position:sticky;top:0;z-index:100;background:rgba(245,239,248,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
    .nav-in{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;padding:0 1.5rem}
    .logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--pri);cursor:pointer}
    .logo small{font-family:'Inter',sans-serif;font-size:0.55rem;font-weight:400;color:var(--txt-m);display:block;letter-spacing:2px;text-transform:uppercase;margin-top:-2px}
    .cart-btn{position:relative;background:var(--card-alt);border:1px solid var(--bdr);color:var(--txt);padding:7px 14px;border-radius:10px;cursor:pointer;font-size:0.82rem;font-family:'Inter',sans-serif;transition:all 0.2s;display:flex;align-items:center;gap:5px}
    .cart-btn:hover{border-color:var(--pri);background:var(--pri-dim)}
    .cart-badge{position:absolute;top:-5px;right:-5px;background:var(--pri);color:#fff;font-size:0.6rem;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center}

    .hero{text-align:center;padding:2.5rem 1.5rem 1.5rem;background:radial-gradient(ellipse at top,rgba(155,127,192,0.06),transparent 70%)}
    .hero h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--txt);margin-bottom:0.4rem}
    .hero h1 em{font-style:normal;color:var(--pri)}
    .hero p{color:var(--txt-m);max-width:580px;margin:0 auto;font-size:0.85rem;line-height:1.7}

    .search{max-width:600px;margin:1.2rem auto 0;position:relative}
    .search input{width:100%;padding:11px 16px 11px 42px;background:var(--card);border:1px solid var(--bdr);border-radius:12px;color:var(--txt);font-size:0.88rem;font-family:'Inter',sans-serif;outline:none;transition:border 0.2s}
    .search input::placeholder{color:var(--txt-mm)}
    .search input:focus{border-color:var(--pri)}
    .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;stroke:var(--txt-m);fill:none}

    .sec-title{max-width:1280px;margin:1.8rem auto 0.8rem;padding:0 1.5rem;font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--txt);font-weight:600}

    .pres-row{max-width:1280px;margin:0 auto 1rem;padding:0 1.5rem;display:flex;gap:0.75rem;overflow-x:auto;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;padding-bottom:4px}
    .pres-card{min-width:170px;max-width:195px;flex-shrink:0;background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:12px;cursor:pointer;transition:all 0.2s;text-align:center}
    .pres-card:hover,.pres-card.on{border-color:var(--pri);box-shadow:var(--sh)}
    .pres-card.on{background:var(--pri-dim)}
    .pres-card img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--pri);margin:0 auto 8px;display:block}
    .pres-card h4{font-family:'Playfair Display',serif;font-size:0.78rem;font-weight:600;color:var(--txt);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .pres-card .brand{font-size:0.6rem;color:var(--pri);font-weight:600;text-transform:uppercase;letter-spacing:0.8px}
    .pres-card .cnt{font-size:0.6rem;color:var(--txt-m);margin-top:3px}

    .brand-pills{max-width:1280px;margin:0 auto 1rem;padding:0 1.5rem;display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center}
    .pill{padding:5px 12px;border-radius:20px;background:var(--card);border:1px solid var(--bdr);color:var(--txt-m);cursor:pointer;font-size:0.72rem;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap}
    .pill:hover,.pill.on{background:var(--pri);color:#fff;border-color:var(--pri);font-weight:600}
    .sort-sel{margin-left:auto;padding:5px 10px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;color:var(--txt);font-size:0.72rem;font-family:'Inter',sans-serif;cursor:pointer;outline:none}

    .grid-wrap{max-width:1280px;margin:0 auto;padding:0 1.5rem 3rem}
    .grid-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.8rem}
    .res-cnt{font-size:0.78rem;color:var(--txt-m)}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.1rem}

    .card{background:var(--card);border-radius:14px;border:1px solid var(--bdr);overflow:hidden;transition:all 0.25s}
    .card:hover{border-color:var(--pri);box-shadow:var(--sh);transform:translateY(-2px)}
    .card-img{position:relative;width:100%;height:180px;background:var(--card-alt);overflow:hidden}
    .card-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
    .card:hover .card-img img{transform:scale(1.04)}

    .bdg{position:absolute;padding:3px 8px;border-radius:6px;font-size:0.62rem;font-weight:700;letter-spacing:0.2px}
    .bdg-dsc{top:8px;right:8px;background:var(--no);color:#fff}
    .bdg-stk{top:8px;left:8px;background:rgba(255,255,255,0.92);backdrop-filter:blur(4px);padding:4px 8px;border-radius:6px;display:flex;align-items:center;gap:5px}
    .stk-dot{width:7px;height:7px;border-radius:50%;animation:pulse 2s infinite}
    .stk-dot.ok{background:var(--ok)}.stk-dot.lo{background:var(--no)}
    .stk-txt{font-size:0.65rem;font-weight:600;color:var(--txt)}

    .bdg-pres{bottom:8px;left:8px;right:8px;background:rgba(255,255,255,0.92);backdrop-filter:blur(6px);border-radius:8px;padding:5px 8px;display:flex;align-items:center;gap:6px}
    .bdg-pres img{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1.5px solid var(--pri)}
    .bdg-pres .pn{font-size:0.65rem;font-weight:600;color:var(--txt)}
    .bdg-pres .pr{font-size:0.55rem;color:var(--pri)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

    .card-body{padding:12px 14px 14px}
    .card-brand{font-size:0.6rem;color:var(--pri);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
    .card-name{font-family:'Playfair Display',serif;font-size:0.85rem;font-weight:600;color:var(--txt);line-height:1.3;margin-bottom:2px}
    .card-ev{font-size:0.65rem;color:var(--txt-m);margin-bottom:8px}

    .price-blk{margin-bottom:8px}
    .pr-row{display:flex;align-items:baseline;gap:5px;margin-bottom:1px}
    .pr-lbl{font-size:0.6rem;color:var(--txt-m);min-width:32px}
    .pr-ofc{text-decoration:line-through;color:var(--txt-mm);font-size:0.75rem}
    .pr-sale{color:var(--pri);font-size:1.05rem;font-weight:700}
    .pr-save{display:inline-block;padding:2px 7px;border-radius:5px;background:rgba(107,175,128,0.1);color:var(--ok);font-size:0.6rem;font-weight:600;margin-top:2px}

    .sell-row{display:flex;align-items:center;gap:7px;padding:7px 0;border-top:1px solid var(--bdr);margin-bottom:8px}
    .sell-av{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--pri),var(--pri-l));display:flex;align-items:center;justify-content:center;font-size:0.58rem;font-weight:700;color:#fff;flex-shrink:0}
    .sell-nm{font-size:0.72rem;font-weight:600;color:var(--txt)}
    .sell-v{font-size:0.58rem;color:var(--ok)}

    .prog-wrap{margin-bottom:10px}
    .prog-lbl{font-size:0.6rem;color:var(--txt-m);margin-bottom:3px}
    .prog-track{width:100%;height:4px;background:var(--card-alt);border-radius:2px;overflow:hidden}
    .prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--pri),var(--pri-l));transition:width 0.6s}
    .prog-amt{font-size:0.6rem;color:var(--txt-m);margin-top:2px}

    .add-btn{width:100%;padding:9px;background:linear-gradient(135deg,var(--pri),var(--pri-l));border:none;border-radius:9px;color:#fff;font-size:0.82rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s;letter-spacing:0.2px}
    .add-btn:hover{opacity:0.88;transform:scale(1.01)}
    .add-btn:disabled{opacity:0.3;cursor:not-allowed;transform:none}

    .ov{position:fixed;inset:0;z-index:200;background:rgba(45,36,64,0.35);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;padding:1.5rem}
    .ov.show{display:flex}
    .mdl{background:var(--card);border-radius:18px;border:1px solid var(--bdr);width:100%;max-width:460px;max-height:90vh;overflow-y:auto}
    .mdl-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--card);z-index:1}
    .mdl-h h2{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--txt)}
    .mdl-x{width:28px;height:28px;border-radius:7px;background:var(--card-alt);border:1px solid var(--bdr);color:var(--txt);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .mdl-x:hover{background:var(--no);border-color:var(--no);color:#fff}
    .mdl-b{padding:18px}

    .ci{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--bdr)}
    .ci:last-child{border-bottom:none}
    .ci-img{width:64px;height:64px;border-radius:8px;object-fit:cover;background:var(--card-alt);flex-shrink:0}
    .ci-info{flex:1}
    .ci-nm{font-size:0.78rem;font-weight:600;color:var(--txt);margin-bottom:1px}
    .ci-sell{font-size:0.65rem;color:var(--txt-m);margin-bottom:2px}
    .ci-pr{font-size:0.9rem;font-weight:700;color:var(--pri)}
    .ci-qty{display:flex;align-items:center;gap:6px;margin-top:3px}
    .qbtn{width:24px;height:24px;border-radius:5px;background:var(--card-alt);border:1px solid var(--bdr);color:var(--txt);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif}
    .qbtn:hover{background:var(--pri);color:#fff;border-color:var(--pri)}
    .ci-rm{background:none;border:none;color:var(--no);font-size:0.68rem;cursor:pointer;padding:2px 0;font-family:'Inter',sans-serif}
    .ci-rm:hover{text-decoration:underline}

    .ct-sum{padding:14px 18px;border-top:1px solid var(--bdr);background:var(--pri-dim);border-radius:0 0 18px 18px}
    .ct-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .ct-lbl{font-size:0.85rem;color:var(--txt)}
    .ct-pr{font-size:1.15rem;font-weight:700;color:var(--pri)}
    .pay-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--pri),var(--pri-l));border:none;border-radius:10px;color:#fff;font-size:0.88rem;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:all 0.2s}
    .pay-btn:hover{opacity:0.88}
    .pay-btn:disabled{opacity:0.3;cursor:not-allowed}

    .empty-c{text-align:center;padding:28px 18px;color:var(--txt-m)}
    .empty-c .ic{font-size:2.2rem;margin-bottom:6px;opacity:0.35}
    .empty-c p{font-size:0.82rem}

    .qr-sec{text-align:center;padding:22px 18px}
    .qr-sec h3{font-family:'Playfair Display',serif;font-size:0.95rem;margin-bottom:3px;color:var(--txt)}
    .qr-sec p{color:var(--txt-m);font-size:0.78rem;margin-bottom:14px}
    .qr-box{width:190px;height:190px;margin:0 auto 14px;background:#fff;border-radius:12px;padding:12px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bdr)}
    .qr-g{width:100%;height:100%;display:grid;grid-template-columns:repeat(21,1fr);grid-template-rows:repeat(21,1fr);gap:0}
    .qc{background:var(--txt)}.qw{background:#fff}
    .qr-amt{font-size:1.3rem;font-weight:700;color:var(--pri);margin-bottom:3px}
    .qr-ref{font-size:0.68rem;color:var(--txt-m);margin-bottom:3px}
    .qr-ph{font-size:0.7rem;color:var(--txt-m);margin-bottom:14px}
    .cfm-btn{padding:9px 26px;border-radius:9px;background:var(--ok);border:none;color:#fff;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
    .cfm-btn:hover{opacity:0.88}

    .ok-msg{text-align:center;padding:28px 18px}
    .ok-msg .ck{width:48px;height:48px;border-radius:50%;background:var(--ok);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:1.2rem;color:#fff}
    .ok-msg h3{font-family:'Playfair Display',serif;margin-bottom:5px;color:var(--txt)}
    .ok-msg p{color:var(--txt-m);font-size:0.78rem;margin-bottom:14px}

    .no-res{text-align:center;padding:40px 18px;color:var(--txt-m);grid-column:1/-1}
    .no-res h3{color:var(--txt);margin-bottom:5px;font-family:'Playfair Display',serif}

    @media(max-width:768px){.hero h1{font-size:1.4rem}.grid{grid-template-columns:1fr}.pres-row{flex-wrap:nowrap}}
    ::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.card{animation:fadeUp 0.3s ease forwards}
  </style>
</head>

<nav><div class="nav-in">
  <div class="logo" onclick="resetView()">SpenderMarket<small>Fandom to Market</small></div>
  <button class="cart-btn" onclick="openCart()">&#128722; ตะกร้า<span class="cart-badge" id="cartCount">0</span></button>
</div></nav>

<div class="hero">
  <h1>แฟนคลับขายต่อ <em>ของดีราคาโดน</em></h1>
  <p>ซื้อจากอีเวนต์แบรนด์ โปรเซลล์ ของแถม แล้วนำมาปล่อยต่อในราคาถูกกว่า ทุกชิ้นใบเสร็จรับประกัน</p>
  <div class="search">
    <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="ค้นหาสินค้า, แบรนด์, ชื่องานอีเวนต์..." oninput="filterProducts()">
  </div>
</div>

<h2 class="sec-title">&#11088; พรีเซ็นเตอร์ / คนดังที่รีวิว</h2>
<div class="pres-row" id="presList"></div>

<div class="brand-pills" id="brandPills"></div>

<div class="grid-wrap">
  <div class="grid-hdr"><span class="res-cnt" id="resCnt"></span></div>
  <div class="grid" id="grid"></div>
</div>

<div class="ov" id="cartOv">
  <div class="mdl">
    <div class="mdl-h"><h2>&#128722; ตะกร้าสินค้า</h2><button class="mdl-x" onclick="closeCart()">&times;</button></div>
    <div class="mdl-b" id="cartBody"></div>
    <div class="ct-sum" id="cartSum" style="display:none">
      <div class="ct-row"><span class="ct-lbl">รวมทั้งหมด</span><span class="ct-pr" id="cartTotal">฿0</span></div>
      <button class="pay-btn" onclick="openPay()">ชำระเงินผ่าน PromptPay</button>
    </div>
  </div>
</div>

<div class="ov" id="payOv">
  <div class="mdl">
    <div class="mdl-h"><h2>&#128179; ชำระเงิน</h2><button class="mdl-x" onclick="closePay()">&times;</button></div>
    <div id="payContent"></div>
  </div>
</div>

let cart=[],curPres=null,curBrand="all";

function renderPres(){
  document.getElementById("presList").innerHTML=P.map(p=>{
    const c=D.filter(x=>x.pid===p.id).length;
    return `<div class="pres-card ${curPres===p.id?'on':''}" onclick="filterPres(${p.id})">
      <img src="${p.img}" alt="${p.name}">
      <h4>${p.name}</h4>
      <div class="brand">${p.brand}</div>
      <div class="cnt">${c} สินค้า | ${p.ig}</div>
    </div>`;
  }).join("");
}

function renderBrands(){
  const brands=[...new Set(D.map(x=>x.brand))].sort();
  document.getElementById("brandPills").innerHTML=
    `<button class="pill ${curBrand==='all'?'on':''}" onclick="setBrand('all')">ทุกแบรนด์</button>`+
    brands.map(b=>`<button class="pill ${curBrand===b?'on':''}" onclick="setBrand('${b}')">${b}</button>`).join("")+
    `<select class="sort-sel" id="sortSel" onchange="filterProducts()"><option value="default">เรียงลำดับ</option><option value="low">ราคาถูกสุด</option><option value="high">ราคาแพงสุด</option><option value="disc">ส่วนลดมากสุด</option></select>`;
}

function renderGrid(list){
  const g=document.getElementById("grid");
  document.getElementById("resCnt").textContent=`${list.length} รายการ`;
  if(!list.length){g.innerHTML=`<div class="no-res"><h3>ไม่พบสินค้า</h3><p>ลองค้นหาด้วยคำอื่น</p></div>`;return}
  g.innerHTML=list.map((d,i)=>{
    const disc=Math.round((1-d.sp/d.op)*100);
    const pres=d.pid?P.find(x=>x.id===d.pid):null;
    const sel=S.find(x=>x.id===d.sid);
    const saved=d.op-d.sp;
    const lo=d.stk<=3;
    const prog=Math.floor(Math.random()*40+50);
    return `<div class="card" style="animation-delay:${i*0.03}s">
      <div class="card-img">
        <img src="${d.img}" alt="${d.nm}" loading="lazy">
        <div class="bdg bdg-stk"><div class="stk-dot ${lo?'lo':'ok'}"></div><span class="stk-txt">${lo?'เหลือ '+d.stk+' ชิ้น!':d.stk+' ชิ้น พร้อมส่ง'}</span></div>
        <span class="bdg bdg-dsc">-${disc}%</span>
        ${pres?`<div class="bdg bdg-pres"><img src="${pres.img}" alt="${pres.name}"><div><div class="pn">${pres.name}</div><div class="pr">${pres.brand} ${pres.role}</div></div></div>`:''}
      </div>
      <div class="card-body">
        <div class="card-brand">${d.brand}</div>
        <div class="card-name">${d.nm}</div>
        <div class="card-ev">${d.ev}</div>
        <div class="price-blk">
          <div class="pr-row"><span class="pr-lbl">ราคาเต็ม</span><span class="pr-ofc">฿${d.op.toLocaleString()}</span></div>
          <div class="pr-row"><span class="pr-lbl">ราคาขาย</span><span class="pr-sale">฿${d.sp.toLocaleString()}</span></div>
          <span class="pr-save">ประหยัด ฿${saved.toLocaleString()} (-${disc}%)</span>
        </div>
        <div class="sell-row">
          <div class="sell-av">${sel?sel.ini:'??'}</div>
          <div><div class="sell-nm">${sel?sel.nm:'Unknown'} ${sel&&sel.v?'&#10003;':''}</div><div class="sell-v">${sel&&sel.v?'Verified Seller':'ผู้ขาย'}</div></div>
        </div>
        <div class="prog-wrap">
          <div class="prog-lbl">ยอดสะสมผู้ขายปัจจุบัน</div>
          <div class="prog-track"><div class="prog-fill" style="width:${prog}%"></div></div>
          <div class="prog-amt">฿${(prog*100).toLocaleString()} / ฿10,000</div>
        </div>
        <button class="add-btn" onclick="addToCart(${d.id})" ${d.stk<=0?'disabled':''}>${d.stk<=0?'สินค้าหมด':'เพิ่มลงตะกร้า'}</button>
      </div>
    </div>`;
  }).join("");
}

function filterProducts(){
  const q=(document.getElementById("searchInput").value||"").toLowerCase();
  const sort=document.getElementById("sortSel")?document.getElementById("sortSel").value:"default";
  let list=[...D];
  if(curPres)list=list.filter(x=>x.pid===curPres);
  if(curBrand!=="all")list=list.filter(x=>x.brand===curBrand);
  if(q)list=list.filter(d=>{
    const pr=d.pid?P.find(x=>x.id===d.pid):null;
    const se=S.find(x=>x.id===d.sid);
    return [d.nm,d.nmTH,d.brand,d.cat,d.ev,d.desc,pr?pr.name:'',pr?pr.brand:'',se?se.nm:''].join(" ").toLowerCase().includes(q);
  });
  if(sort==="low")list.sort((a,b)=>a.sp-b.sp);
  else if(sort==="high")list.sort((a,b)=>b.sp-a.sp);
  else if(sort==="disc")list.sort((a,b)=>(a.sp/a.op)-(b.sp/b.op));
  renderGrid(list);
}

function setBrand(b){curBrand=b;curPres=null;renderPres();renderBrands();filterProducts()}
function filterPres(id){curPres=curPres===id?null:id;curBrand="all";renderPres();renderBrands();filterProducts()}
function resetView(){curPres=null;curBrand="all";document.getElementById("searchInput").value="";renderPres();renderBrands();filterProducts()}

function addToCart(id){const d=D.find(x=>x.id===id);if(!d||d.stk<=0)return;const ex=cart.find(c=>c.id===id);if(ex){if(ex.qty<d.stk)ex.qty++}else cart.push({id,qty:1});updBadge()}
function rmCart(id){cart=cart.filter(c=>c.id!==id);updBadge();renderCart()}
function chgQty(id,delta){const it=cart.find(c=>c.id===id);const p=D.find(x=>x.id===id);if(!it)return;it.qty=Math.max(1,Math.min(p.stk,it.qty+delta));renderCart();updBadge()}
function updBadge(){document.getElementById("cartCount").textContent=cart.reduce((s,c)=>s+c.qty,0)}
function openCart(){document.getElementById("cartOv").classList.add("show");renderCart()}
function closeCart(){document.getElementById("cartOv").classList.remove("show")}

function renderCart(){
  const b=document.getElementById("cartBody"),sm=document.getElementById("cartSum");
  if(!cart.length){b.innerHTML=`<div class="empty-c"><div class="ic">&#128722;</div><p>ตะกร้าว่างเปล่า</p></div>`;sm.style.display="none";return}
  let tot=0;
  b.innerHTML=cart.map(c=>{
    const d=D.find(x=>x.id===c.id);const sub=d.sp*c.qty;tot+=sub;
    return `<div class="ci"><img class="ci-img" src="${d.img}" alt="${d.nm}"><div class="ci-info"><div class="ci-nm">${d.nmTH||d.nm}</div><div class="ci-sell">ผู้ขาย: ${S.find(x=>x.id===d.sid)?.nm||'?'} | เหลือ ${d.stk} ชิ้น</div><div class="ci-pr">฿${sub.toLocaleString()}</div><div class="ci-qty"><button class="qbtn" onclick="chgQty(${d.id},-1)">-</button><span>${c.qty}</span><button class="qbtn" onclick="chgQty(${d.id},1)">+</button></div><button class="ci-rm" onclick="rmCart(${d.id})">ลบออก</button></div></div>`;
  }).join("");
  document.getElementById("cartTotal").textContent=`฿${tot.toLocaleString()}`;sm.style.display="block";
}
